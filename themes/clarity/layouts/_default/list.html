{{ define "main" }}
<div class="post-list">
    {{ range .Pages.GroupByDate "2006" }}
    <section class="year-group">
        <h2 class="year">{{ .Key }}</h2>
        {{ range .Pages }}
        <article class="post-item">
            <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 02, 2006" }}</time>
            <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        </article>
        {{ end }}
    </section>
    {{ end }}
</div>
{{ end }}
