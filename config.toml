baseURL = "https://marinhero.com/"
languageCode = "en-us"
title = "Marin Alcaraz"
theme = "concrete"

# Main sections for the blog
[params]
  mainSections = ["posts"]
  author = "Marin Alcaraz"
  description = "Thoughts on software engineering, systems, and technology"

  [params.logo]
    logoText = "Marín Alcaraz"

  [params.twitter]
    creator = "marinftw"
    site = "https://marinhero.com"

# Site configuration
enableRobotsTXT = true
enableGitInfo = true

# Taxonomies
[taxonomies]
  tag = "tags"
  category = "categories"

# Minification
[minify]
  disableHTML = false
  disableCSS = false
  disableJS = false
  disableJSON = false
  disableXML = false
  minifyOutput = true

# Menu
[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/pages/marin"
  weight = 1

# [[menu.main]]
#   identifier = "projects"
#   name = "Projects"
#   url = "/projects"
#   weight = 2

# Markup configuration
[markup]
  [markup.highlight]
    style = "monokailight"
    lineNos = false
    lineNumbersInTable = false
    noClasses = true

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false

  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

# Privacy configuration
[privacy]
  [privacy.disqus]
    disable = true
  [privacy.googleAnalytics]
    disable = true
  [privacy.instagram]
    disable = true
  [privacy.twitter]
    disable = false
    enableDNT = true
    simple = true
  [privacy.vimeo]
    disable = true
  [privacy.youtube]
    disable = false
    privacyEnhanced = true